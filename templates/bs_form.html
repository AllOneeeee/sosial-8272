{% extends 'base.html' %}

{% block content %}

<h2>Blok Sensus</h2>

<form method="POST">

<div class="mb-3">

<label>Kegiatan</label>

<select
    name="kegiatan_id"
    class="form-control">

{% for k in kegiatan %}

<option value="{{k.id}}">
{{k.nama}}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>PPL</label>

<select
    name="ppl_id"
    class="form-control">

{% for p in ppl_list %}

<option value="{{p.id}}">
{{p.nama}}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Kode BS</label>

<input
    name="kode_bs"
    class="form-control">

</div>

<div class="mb-3">

<label>Target</label>

<input
    name="target"
    value="10"
    class="form-control">

</div>

<button
    class="btn btn-primary">

Simpan

</button>

</form>

{% endblock %}
