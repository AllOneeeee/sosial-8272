{% extends 'base.html' %}
{% block content %}

<div class="card shadow-sm border-0 rounded-4">

    <div class="card-header bg-white border-0 py-4">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h3 class="fw-bold mb-1">

                    📊 {{kategori.nama}}

                </h3>

                <small class="text-muted">

                    Kelola indikator pada kategori ini

                </small>

            </div>


            <div>

                <a href="{{url_for('tambah_indikator')}}"
                   class="btn btn-primary rounded-3">

                    <i class="bi bi-plus-lg"></i>

                    Tambah Indikator

                </a>

            </div>

        </div>

    </div>



    <div class="table-responsive">

        <table class="table align-middle mb-0">


            <thead class="table-light">

                <tr>

                    <th width="80">

                        No

                    </th>

                    <th>

                        Indikator

                    </th>

                    <th width="220">

                        Satuan

                    </th>

                    <th width="360">

                        Menu

                    </th>

                </tr>

            </thead>



            <tbody>

                {% for i in indikator %}

                <tr>

                    <td>

                        {{loop.index}}

                    </td>



                    <td>

                        <div class="d-flex align-items-center">


                            <div
                            class="bg-primary bg-opacity-10
                            rounded-3 p-3 me-3">

                                📈

                            </div>


                            <div>

                                <div class="fw-bold">

                                    {{i.nama}}

                                </div>


                                <small class="text-muted">

                                    ID :

                                    {{i.id}}

                                </small>

                            </div>


                        </div>

                    </td>



                    <td>

                        <span class="badge
                        bg-success-subtle
                        text-success
                        px-3 py-2">

                            {{i.satuan}}

                        </span>

                    </td>



                    <td>


                        <a

                        href="{{url_for(

                        'grafik_indikator',

                        id=i.id

                        )}}"

                        class="btn btn-primary btn-sm rounded-3">

                            📈 Grafik

                        </a>



                        <a

                        href="{{url_for(

                        'dashboard_sheet',

                        id=i.id

                        )}}"

                        class="btn btn-warning btn-sm rounded-3">

                            📋 Spreadsheet

                        </a>



                        <a

                        href="{{url_for(

                        'hapus_indikator',

                        id=i.id

                        )}}"

                        class="btn btn-danger btn-sm rounded-3"

                        onclick="return confirm(

                        'Hapus indikator ini ?'

                        );">

                            🗑 Hapus

                        </a>


                    </td>


                </tr>

                {% endfor %}


            </tbody>


        </table>


    </div>


</div>



<div class="mt-3">


<a

href="{{url_for(

'dashboard_strategis'

)}}"

class="btn btn-secondary rounded-3">

<i class="bi bi-arrow-left"></i>

Kembali

</a>


</div>



<style>

.card{

border-radius:20px;

}


.table thead th{

background:#f8fafc;

font-weight:700;

padding:18px;

}


.table td{

padding:20px;

vertical-align:middle;

}


.badge{

font-size:14px;

font-weight:500;

}


.btn-sm{

padding:7px 14px;

}


tr:hover{

background:#f9fafb;

}


</style>


{% endblock %}
