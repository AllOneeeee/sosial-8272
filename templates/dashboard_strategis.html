{% extends 'base.html' %} {% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold">📈 Dashboard Strategis</h2>

  <a href="{{ url_for('tambah_kategori') }}" class="btn btn-primary">
    Tambah Kategori
  </a>
</div>

<div class="row mb-4">
  {% for k in kategori[:4] %}

  <div class="col-md-3">
    <div class="card stat-card">
      <div class="card-body text-center">
        <h5>{{ k.nama }}</h5>

        <h2>{{ jumlah[k.id] }}</h2>

        <p>Indikator</p>
      </div>
    </div>
  </div>

  {% endfor %}
</div>

<div class="row">
  {% for k in kategori %}

  <div class="col-md-3 mb-4">
    <div class="card menu-card">
      <div class="card-body text-center">
        <div style="font-size: 45px">📊</div>

        <h5 class="mt-3">{{ k.nama }}</h5>

        <div class="mt-3">
          <a
            href="{{ url_for('indikator_strategis',id=k.id) }}"
            class="btn btn-primary btn-sm"
          >
            Buka
          </a>

        </div>
      </div>
    </div>
  </div>

  {% endfor %}
</div>

{% endblock %}
