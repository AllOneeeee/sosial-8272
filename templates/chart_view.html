{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">


<div>

<h3>

{{indikator.nama}}

({{indikator.satuan}})

</h3>

</div>



<form method="GET">

<select

name="tahun"

class="form-select"

onchange="this.form.submit()"

>

{% for t in tahun_list %}

<option

value="{{t}}"

{% if t==tahun %}

selected

{% endif %}

>

{{t}}

</option>

{% endfor %}

</select>

</form>


</div>



<div class="card shadow-sm">


<div class="card-body">


{% if labels %}


<canvas

id="grafik"

height="120"

>

</canvas>



{% else %}



<div class="alert alert-warning">


Belum ada data


</div>



{% endif %}



</div>


</div>



<div class="mt-3">


<a

href="{{url_for(

'dashboard_sheet',

id=indikator.id

)}}"

class="btn btn-secondary"

>


<i class="bi bi-arrow-left"></i>


Spreadsheet


</a>



<a

href="{{url_for(

'export_dashboard',

id=indikator.id

)}}"

class="btn btn-success"

>


<i class="bi bi-file-earmark-excel"></i>


Export Excel


</a>


</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



{% if labels %}


<script>


const ctx = document.getElementById(

'grafik'

);



new Chart(


ctx,


{


type:'bar',



data:{



labels:

{{labels|tojson}},




datasets:[{


label:

'{{indikator.nama}}',



data:

{{values|tojson}},



borderWidth:1



}]


},




options:{



responsive:true,



plugins:{



legend:{


display:false


},




title:{



display:true,



text:



'{{indikator.nama}} ({{indikator.satuan}})',



font:{



size:18



}



}




},




scales:{



y:{



beginAtZero:true,



title:{



display:true,



text:



'{{indikator.satuan}}'



}



}



}



}



}



);



</script>


{% endif %}



{% endblock %}
