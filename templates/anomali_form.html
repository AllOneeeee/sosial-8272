{% extends 'base.html' %}

{% block content %}

<h2>Tambah Link Anomali</h2>

<form method="POST">

    <div class="mb-3">
        <label>Judul</label>
        <input type="text"
               name="judul"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Link</label>
        <input type="url"
               name="link"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Keterangan</label>
        <textarea name="keterangan"
                  class="form-control"
                  rows="3"></textarea>
    </div>

    <button class="btn btn-primary">
        Simpan
    </button>

    <a href="{{ url_for('detail_kegiatan',
                        id=kegiatan.id) }}"
       class="btn btn-secondary">
       Kembali
    </a>

</form>

{% endblock %}
