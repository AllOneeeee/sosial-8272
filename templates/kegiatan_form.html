{% extends 'base.html' %}

{% block content %}

<h3>
{% if kegiatan %}
Edit
{% else %}
Tambah
{% endif %}
Kegiatan
</h3>

<form method="post">

    <input
        name="nama"
        class="form-control mb-2"
        placeholder="Nama Kegiatan"
        value="{{ kegiatan.nama if kegiatan else '' }}"
        required>

    <input
        name="tahun"
        type="number"
        class="form-control mb-2"
        placeholder="Tahun"
        value="{{ kegiatan.tahun if kegiatan else '' }}"
        required>

    <div class="row">

        <div class="col-md-6">

            <label class="form-label">
                Tanggal Mulai
            </label>

            <input
                type="date"
                name="tanggal_mulai"
                class="form-control mb-2"
                value="{{ kegiatan.tanggal_mulai if kegiatan else '' }}"
                required>

        </div>

        <div class="col-md-6">

            <label class="form-label">
                Tanggal Selesai
            </label>

            <input
                type="date"
                name="tanggal_selesai"
                class="form-control mb-2"
                value="{{ kegiatan.tanggal_selesai if kegiatan else '' }}"
                required>

        </div>

    </div>

    <select
        name="status"
        class="form-control mb-3">

        <option value="Persiapan"
        {% if kegiatan and kegiatan.status=='Persiapan' %}
        selected
        {% endif %}>
        Persiapan
        </option>

        <option value="Berjalan"
        {% if kegiatan and kegiatan.status=='Berjalan' %}
        selected
        {% endif %}>
        Berjalan
        </option>

        <option value="Selesai"
        {% if kegiatan and kegiatan.status=='Selesai' %}
        selected
        {% endif %}>
        Selesai
        </option>

    </select>

    <button class="btn btn-primary">
        Simpan
    </button>

    {% if kegiatan %}

    <a href="{{ url_for('hapus_kegiatan', id=kegiatan.id) }}"
       class="btn btn-danger"
       onclick="return confirm('Yakin ingin menghapus kegiatan ini?')">

        Hapus

    </a>

    {% endif %}

    <a href="{{ url_for('dashboard') }}"
       class="btn btn-secondary">

        Kembali

    </a>

</form>

{% endblock %}
