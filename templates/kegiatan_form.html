{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">


<div class="card shadow-sm">

<div class="card-header bg-primary text-white">


<h4 class="mb-0">


{% if kegiatan %}

✏️ Edit Kegiatan


{% else %}

➕ Tambah Kegiatan


{% endif %}


</h4>


</div>




<div class="card-body">


<form method="POST">



<div class="mb-3">


<label class="form-label">

Nama Kegiatan

</label>


<input

name="nama"

class="form-control"

value="{{ kegiatan.nama if kegiatan else '' }}"

required>


</div>




<div class="mb-3">


<label class="form-label">

Tahun

</label>


<input

name="tahun"

type="number"

class="form-control"

value="{{ kegiatan.tahun if kegiatan else '' }}"

required>


</div>





<div class="row">


<div class="col-md-6">


<label class="form-label">

Tanggal Mulai

</label>


<input

type="date"

name="tanggal_mulai"

class="form-control"

value="{{ kegiatan.tanggal_mulai if kegiatan else '' }}">


</div>




<div class="col-md-6">


<label class="form-label">

Tanggal Selesai

</label>


<input

type="date"

name="tanggal_selesai"

class="form-control"

value="{{ kegiatan.tanggal_selesai if kegiatan else '' }}">


</div>



</div>




<div class="mt-3">


<label class="form-label">

Status

</label>


<select

name="status"

class="form-select">


<option value="Persiapan"

{% if kegiatan and kegiatan.status=='Persiapan' %}

selected

{% endif %}>


Persiapan


</option>



<option value="Berjalan"

{% if kegiatan and kegiatan.status=='Berjalan' %}

selected

{% endif %}>


Berjalan


</option>



<option value="Selesai"

{% if kegiatan and kegiatan.status=='Selesai' %}

selected

{% endif %}>


Selesai


</option>



</select>


</div>



<hr>



<button class="btn btn-primary">

<i class="bi bi-save"></i>

Simpan

</button>



{% if kegiatan %}

<a href="{{ url_for('hapus_kegiatan',
id=kegiatan.id) }}"

class="btn btn-danger"

onclick="return confirm('Hapus kegiatan ini ?')">


<i class="bi bi-trash"></i>

Hapus


</a>

{% endif %}



<a href="{{ url_for('kegiatan') }}"

class="btn btn-secondary">


<i class="bi bi-arrow-left"></i>

Kembali


</a>



</form>

</div>

</div>

</div>


{% endblock %}
