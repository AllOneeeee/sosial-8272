{% extends 'base.html' %} {% block content %}

<div class="container-fluid">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">➕ Tambah Penugasan</h4>
    </div>

    <div class="card-body">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label"> Kegiatan </label>

          <select name="kegiatan_id" class="form-select searchable" required>
            <option value="">Pilih Kegiatan</option>

            {% for k in kegiatan %}

            <option value="{{ k.id }}">{{ k.nama }}</option>

            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label"> PML </label>

          <select name="pml_id" class="form-select searchable" required>
            <option value="">Pilih PML</option>

            {% for pml in pml_list %}

            <option value="{{ pml.id }}">{{ pml.nama }}</option>

            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label"> PPL </label>

          <div id="ppl-container">
            <div class="input-group mb-2">
              <select name="ppl_ids[]" class="form-select searchable" required>
                <option value="">Pilih PPL</option>

                {% for p in ppl_list %}

                <option value="{{ p.id }}">{{ p.nama }}</option>

                {% endfor %}
              </select>

              <button type="button" class="btn btn-danger remove-ppl d-none">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>

          <button
            type="button"
            id="add-ppl"
            class="btn btn-success btn-sm mt-2"
          >
            <i class="bi bi-plus-circle"></i>

            Tambah PPL
          </button>
        </div>

        <hr />

        <button class="btn btn-primary">
          <i class="bi bi-save"></i>

          Simpan
        </button>

        <a href="{{ url_for('penugasan') }}" class="btn btn-secondary">
          <i class="bi bi-arrow-left"></i>

          Kembali
        </a>
      </form>
    </div>
  </div>
</div>

<script>
  const template = `

<div class="input-group mb-2">

<select name="ppl_ids[]"
        class="form-select"
        required>

<option value="">
Pilih PPL
</option>

{% for p in ppl_list %}

<option value="{{ p.id }}">

{{ p.nama }}

</option>

{% endfor %}

</select>

<button type="button"
        class="btn btn-danger remove-ppl">

<i class="bi bi-trash"></i>

</button>

</div>

`;

  document.getElementById("add-ppl").addEventListener(
    "click",

    function () {
      document
        .getElementById("ppl-container")

        .insertAdjacentHTML(
          "beforeend",

          template,
        );
    },
  );

  document.addEventListener(
    "click",

    function (e) {
      if (e.target.closest(".remove-ppl")) {
        const rows = document.querySelectorAll("#ppl-container .input-group");

        if (rows.length > 1) {
          e.target.closest(".input-group").remove();
        }
      }
    },
  );
</script>

{% endblock %}
